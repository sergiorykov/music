name: Compile PDFs

on:
  push:
    branches: ["main"]
    paths:
      - "songs/*.typ"
      - "template.typ"
      - "settings.typ"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install typst
        run: |
          curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz \
            | tar -xJ --strip-components=1 -C /usr/local/bin typst-x86_64-unknown-linux-musl/typst

      - name: Compile all songs to PDF
        run: |
          mkdir -p pdf
          for f in songs/*.typ; do
            name=$(basename "$f" .typ)
            typst compile --root . "$f" "pdf/${name}.pdf"
          done

      - name: Commit PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf/
          git diff --staged --quiet || git commit -m "chore: regenerate PDFs [skip ci]" && git push
