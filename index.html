<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>songs</title>
  <style>
    :root {
      --bg:      #0d0d0d;
      --surface: #161616;
      --border:  #2a2a2a;
      --text:    #e8e8e8;
      --muted:   #666;
      --accent:  #c8a96e;
      --hover:   #1e1e1e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 6rem;
    }

    .container { width: 100%; max-width: 560px; }

    /* ── Header ── */
    header { margin-bottom: 3.5rem; }

    header h1 {
      font-size: 1.25rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    header p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--muted);
    }

    /* ── Song list ── */
    .songs { list-style: none; }

    .songs li {
      border-top: 1px solid var(--border);
    }

    .songs li:last-child {
      border-bottom: 1px solid var(--border);
    }

    .songs a {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 0.25rem;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, color 0.15s;
      border-radius: 2px;
    }

    .songs a:hover {
      background: var(--hover);
      color: var(--accent);
      padding-left: 0.75rem;
    }

    .song-title {
      font-size: 1rem;
    }

    .song-meta {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .songs a:hover .song-meta {
      color: var(--accent);
      opacity: 0.6;
    }

    /* ── SoundCloud button ── */
    .sc-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      padding: 0.2em 0.6em;
      border-radius: 3px;
      background: #ff5500;
      color: #fff;
      font-size: 0.7rem;
      font-family: sans-serif;
      text-decoration: none;
      letter-spacing: 0.03em;
      white-space: nowrap;
      position: relative;
      transition: opacity 0.15s;
    }

    .sc-btn:hover { opacity: 0.85; }

    .sc-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      right: 0;
      background: #1a1a1a;
      color: #ccc;
      font-size: 0.7rem;
      padding: 0.3em 0.6em;
      border-radius: 3px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s, transform 0.15s;
      border: 1px solid #333;
    }

    .sc-btn:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Author ── */
    .author {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .author img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      filter: grayscale(30%);
    }

    .author-name {
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* ── Footer ── */
    footer {
      margin-top: 4rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    footer a {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    footer a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="author">
        <img src="images/author-photo.jpg" alt="Sergio Rykov" />
        <span class="author-name">Sergio Rykov</span>
      </div>
      <h1>songs</h1>
      <p>Indie songs — lyrics, chords, and lead sheets.<br>PDFs typeset with Typst.</p>
    </header>

    <ul class="songs">
      <li>
        <a href="pdf/Береги себя.pdf" target="_blank">
          <span class="song-title">Береги себя</span>
          <span class="song-meta">
            <a class="sc-btn"
               href="https://soundcloud.com/sergiorykov/beregi-sebya"
               target="_blank" rel="noopener"
               data-tooltip="Listen on SoundCloud"
               onclick="event.stopPropagation()">
              &#9654; SC
            </a>
            &nbsp;PDF
          </span>
        </a>
      </li>
    </ul>

    <footer>
      <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>
    </footer>
  </div>
</body>
</html>
